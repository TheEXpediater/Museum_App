services:
  mongodb:
    image: mongodb/mongodb-community-server:7.0-ubuntu2204
    container_name: museum-guide-mongodb
    ports:
      - "27017:27017"
    volumes:
      - museum_mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  museum_mongodb_data:
